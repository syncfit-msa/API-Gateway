server:
  port: 8000

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${SRV_EUREKA:localhost}:${SRV_EUREKA_PORT:8761}/eureka

spring:
  application:
    name: apigateway-service
  config:
    import: optional:configserver:http://${SRV_CONFIG_HOST:127.0.0.1}:${SRV_CONFIG_PORT:8888}/
  rabbitmq:
    host: ${SRV_OUTER_RABBITMQ}
    port: ${SRV_OUTER_RABBITMQ_PORT}
    username: ${SRV_OUTER_RABBITMQ_USERNAME}
    password: ${SRV_OUTER_RABBITMQ_PASSWORD}
    listener:
      simple:
        prefetch: 5

management:
  endpoints:
    web:
      exposure:
        include: refresh, health, beans, httpexchanges, busrefresh, info, metrics, prometheus