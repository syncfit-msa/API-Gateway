server:
  port: 8000

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${SRV_EUREKA:localhost}:${SRV_EUREKA_PORT:8761}/eureka

spring:
  application:
    name: apigateway

management:
  endpoints:
    web:
      exposure:
        include: refresh, health, beans, httpexchanges, busrefresh, info, metrics, prometheus